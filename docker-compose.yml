version: '3.8'

services:
  web:
    build: .
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    command: celery -A backend.celery_app worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  beat:
    build: .
    command: celery -A backend.celery_app beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  data_worker:
    build: .
    command: python backend/run_data_microservice.py
    env_file:
      - .env
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
